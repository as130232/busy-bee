services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: busy-bee-postgres
    environment:
      POSTGRES_USER: busybee
      POSTGRES_PASSWORD: busybee
      POSTGRES_DB: busybee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busybee"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
