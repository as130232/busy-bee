services:
  postgres:
    image: postgres:16-alpine
    container_name: busy-bee-postgres
    environment:
      POSTGRES_USER: busybee
      POSTGRES_PASSWORD: busybee
      POSTGRES_DB: busybee
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U busybee"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: busy-bee-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
