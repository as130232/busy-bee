version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "query"
    gen:
      go:
        package: "sqlcgen"
        out: "../infrastructure/db/sqlcgen"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
