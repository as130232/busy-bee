openapi: 3.1.0
info:
  title: Busy Bee API
  description: 開會錄音 → STT → LLM → PRD/Tech Spec 的 AI 輔助工具後端 API。
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: 本地開發
  - url: https://busy-bee-api.example.run.app
    description: Cloud Run（部署後更新）

tags:
  - name: infra
    description: 健康檢查等基礎端點
  - name: users
    description: 用戶
  - name: meetings
    description: 會議

paths:
  /health:
    get:
      tags: [infra]
      summary: 健康檢查
      operationId: getHealth
      security: []
      responses:
        "200":
          description: 服務正常
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status: { type: string, example: ok }
                          env: { type: string, example: local }

  /api/v1/users/sync:
    post:
      tags: [users]
      summary: 登入後同步用戶（以 firebase_uid upsert）
      description: 前端完成 Google 登入後呼叫；非白名單 email 回 403。
      operationId: syncUser
      responses:
        "200":
          description: 同步成功，回傳用戶資料
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/meetings:
    get:
      tags: [meetings]
      summary: 本人會議列表（新→舊，可關鍵字搜尋）
      operationId: listMeetings
      parameters:
        - name: search
          in: query
          required: false
          schema: { type: string }
          description: 關鍵字（比對 title 與 transcript，ILIKE）
      responses:
        "200":
          description: 列表（不含 transcript）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [meetings]
                        properties:
                          meetings:
                            type: array
                            items:
                              $ref: "#/components/schemas/Meeting"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [meetings]
      summary: 建立會議並取得音訊直傳 URL
      description: 回傳的 upload.url 供前端直接 PUT 音訊到 GCS（需帶 upload.headers）；上傳完成後呼叫 complete-upload。
      operationId: createMeeting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, contentType]
              properties:
                title: { type: string, example: 架構討論會議 }
                contentType:
                  type: string
                  description: 音訊 MIME type（audio/mpeg, audio/mp4, audio/x-m4a, audio/webm, audio/wav）
                  example: audio/webm
      responses:
        "200":
          description: 建立成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [meeting, upload]
                        properties:
                          meeting:
                            $ref: "#/components/schemas/Meeting"
                          upload:
                            type: object
                            required: [url, headers]
                            properties:
                              url: { type: string }
                              headers:
                                type: object
                                additionalProperties: { type: string }
        "400":
          description: title 空白或 contentType 不支援（errCode 40001）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/meetings/{id}:
    get:
      tags: [meetings]
      summary: 會議詳情（含逐字稿）
      operationId: getMeeting
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 詳情
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [meeting]
                        properties:
                          meeting:
                            $ref: "#/components/schemas/MeetingDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 不存在或非本人（errCode 40401）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/v1/meetings/{id}/retry:
    post:
      tags: [meetings]
      summary: 重跑失敗的會議
      operationId: retryMeeting
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 已重新排入（status 回到 pending）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [meeting]
                        properties:
                          meeting:
                            $ref: "#/components/schemas/Meeting"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 不存在或非本人
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }
        "409":
          description: 非 failed 狀態不可重跑（errCode 40901）
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /api/v1/meetings/{id}/complete-upload:
    post:
      tags: [meetings]
      summary: 音訊直傳完成，觸發背景處理
      description: 驗證物件已存在後將狀態推進為 pending 並排入處理佇列；對已處理中的會議冪等。
      operationId: completeMeetingUpload
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 已進入處理佇列（或已在處理中）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [meeting]
                        properties:
                          meeting:
                            $ref: "#/components/schemas/Meeting"
        "400":
          description: 音訊尚未上傳（errCode 40001）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 會議不存在或非本人所有（errCode 40401）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "409":
          description: 狀態衝突（errCode 40901）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

  /api/v1/meetings/{id}/artifacts:
    get:
      tags: [meetings]
      summary: 取回會議的 AI 生成文件（PRD / Tech Spec）
      operationId: listMeetingArtifacts
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: 文件清單（處理未完成時可能為空陣列）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [artifacts]
                        properties:
                          artifacts:
                            type: array
                            items:
                              $ref: "#/components/schemas/Artifact"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: 會議不存在或非本人所有（errCode 40401）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"

components:
  securitySchemes:
    firebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Firebase ID token

  schemas:
    Envelope:
      type: object
      description: 統一 response envelope
      required: [errCode, msg]
      properties:
        errCode:
          type: integer
          description: 0 = 成功；非 0 為業務錯誤碼（HTTP status 三碼 + 兩碼流水號）
          example: 0
        msg:
          type: string
          example: success
        traceId:
          type: string
          example: 43499282e559d33a

    User:
      type: object
      required: [id, email, displayName, avatarUrl, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        avatarUrl: { type: string }
        createdAt: { type: string, format: date-time }

    Meeting:
      type: object
      required: [id, title, status, durationSeconds, remindBeforeMin, createdAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        status:
          type: string
          enum: [scheduled, pending, transcribing, analyzing, completed, failed]
        durationSeconds: { type: integer }
        errorMessage: { type: string }
        scheduledAt: { type: string, format: date-time }
        remindBeforeMin: { type: integer }
        createdAt: { type: string, format: date-time }

    MeetingDetail:
      allOf:
        - $ref: "#/components/schemas/Meeting"
        - type: object
          required: [transcript]
          properties:
            transcript: { type: string }

    Artifact:
      type: object
      required: [id, type, content, createdAt]
      properties:
        id: { type: string, format: uuid }
        type:
          type: string
          enum: [prd, tech_spec]
        content:
          type: string
          description: Markdown 全文
        createdAt: { type: string, format: date-time }

  responses:
    Unauthorized:
      description: 未帶有效 Firebase ID token（errCode 40101）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"
    Forbidden:
      description: email 不在白名單（errCode 40301）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Envelope"

security:
  - firebaseAuth: []
